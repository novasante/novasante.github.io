<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": {{ page.title | jsonify }},
  "description": {{ page.description | strip_newlines | jsonify }},
  "url": {{ page.url | prepend: site.url | jsonify }},
  "telephone": {{ page.phone | jsonify }},
  "email": {{ page.email | jsonify }},
  "image": {
    "@type": "ImageObject",
    "url": {{ page.image | jsonify }},
    "caption": {{ page.title | jsonify }}
  },
  "worksFor": {
    "@type": "MedicalBusiness",
    "name": {{ site.title | jsonify }},
    "url": {{ site.url | jsonify }},
    "address": {
      "@type": "PostalAddress",
      "streetAddress": {{ site.address.streetAddress | jsonify }},
      "addressLocality": {{ site.address.addressLocality | jsonify }},
      "postalCode": {{ site.address.postalCode | jsonify }},
      "addressRegion": {{ site.address.addressRegion | jsonify }},
      "addressCountry": {{ site.address.addressCountry | jsonify }}
    }
  },
{% comment %}
  "medicalSpecialty": [
    "Acupuncture",
    "PhysicalTherapy",
    "Osteopathic"
  ],
{% endcomment %}
  "sameAs": [{% for pair in page.urls %}{{ pair[1] | jsonify }}{% unless forloop.last %},{% endunless %}{% endfor %}]
}
</script>
