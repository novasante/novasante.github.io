<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": ["MedicalBusiness", "LocalBusiness"],
  "name": {{ site.title | jsonify }},
  "description": {{ page.description | strip_newlines | jsonify }},
  "url": {{ site.url | jsonify }},
  "logo": {
    "@type": "ImageObject",
    "url": {{ site.logo | jsonify }}
  },
  "image": {{ site.logo | jsonify }},
  "telephone": {{ site.contact.phone | jsonify }},
  "email": {{ site.contact.email | jsonify }},
  "address": {
    "@type": "PostalAddress",
    "streetAddress": {{ site.address.streetAddress | jsonify }},
    "addressLocality": {{ site.address.addressLocality | jsonify }},
    "postalCode": {{ site.address.postalCode | jsonify }},
    "addressRegion": {{ site.address.addressRegion | jsonify }},
    "addressCountry": {{ site.address.addressCountry | jsonify }}
  },
  "geo": {
    "@type": "GeoCoordinates",
    "latitude": {{ site.address.geo.latitude | jsonify }},
    "longitude": {{ site.address.geo.longitude | jsonify }}
  },
  "hasMap": {{ site.address.map | jsonify }},
{% comment %}
  "openingHoursSpecification": [
    {
      "@type": "OpeningHoursSpecification",
      "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
      "opens": "08:00",
      "closes": "19:00"
    }
  ],

  "medicalSpecialty": [
    "Acupuncture",
    "PhysicalTherapy",
    "Osteopathic"
  ],
{% endcomment %}
  "sameAs": [{% for pair in site.urls %}{{ pair[1] | jsonify }}{% unless forloop.last %},{% endunless %}{% endfor %}],
  "employee": [
    {% for practitioner in site.practitioners %}
      {
        "@type": "Person",
        "name": {{ practitioner.title | jsonify }},
        "jobTitle": {{ practitioner.function | jsonify }},
        "url": {{ practitioner.url | prepend: site.url | jsonify }}{% if practitioner.urls and practitioner.urls.size > 0 %},
        "sameAs": [{% for pair in practitioner.urls %}{{ pair[1] | jsonify }}{% unless forloop.last %},{% endunless %}{% endfor %}]
        {% endif %}{% if practitioner.image %},
        "image": {{ practitioner.image | jsonify }}{% endif %}
      }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
