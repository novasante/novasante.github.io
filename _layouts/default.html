<!DOCTYPE html>
<html lang="fr" >
{% include head.html %}
<body>
<a href="#sections" class="skip">Skip to main content</a>
{% include icons.html %}

<dialog id="phone-contact" class="phone-contact" onclick="this.close()">
  <form method="dialog" onclick="event.stopPropagation()">
    <p>Prendre contact:</p>
    <ul class="buttons_list">
      <li>
        <a class="button" id="phone-contact-sms" href="#" title="SMS">
          <svg class="icon" width="18px" height="18px" aria-hidden="true">
            <use xlink:href="#forum_24dp"></use>
          </svg> SMS</a>
      </li>
      <li>
        <a class="button" id="phone-contact-whatsapp" href="#" title="WhatsApp">
          <svg class="icon" width="18px" height="18px" aria-hidden="true">
            <use xlink:href="#whatsapp_24dp"></use>
          </svg> WhatsApp</a>
      </li>
    </ul>
    <div>
      <button class="button hidden" id="cancel" type="reset" onclick="document.getElementById('phone-contact').close()">Annuler</button>
    </div>
  </form>
</dialog>
<dialog id="booking-modal" class="booking-modal" onclick="this.close()">
  <form method="dialog" onclick="event.stopPropagation()">
    <div class="booking-modal__content">
      <button type="button" class="booking-modal__close" aria-label="Fermer" onclick="document.getElementById('booking-modal').close()">X</button>
      <iframe src="" title="Prendre rendez-vous" loading="lazy"></iframe>
    </div>
  </form>
</dialog>

<div class="container banner-intersecting inverted-top">
  <input id="toggler" type="checkbox" />
  {% include navigation.html %}
  <div class="wrapper">
    <div id="home"></div>
    <label class="toggler-wrapper" for="toggler"></label>
    <div class="mobile-navbar">
      <label class="toggler inverted" for="toggler">
        <span class="navicon"></span>
        <svg class="logo icon" width="18px" height="18px" aria-hidden="true">
          <use xlink:href="#logo_24dp"></use>
        </svg>
      </label>
      <span class="title hide-on-top"><a href="#home">{{ site.short_title }} <span class="display-none xs--display-inline">{{ site.baseline }}</span></a></span>
    </div>
    <div class="content">
      {% include homepage_banner.html %}
      <main role="main" id="sections" class="sections">
        {{ content }}
      </main>
      {% include footer.html %}
    </div>
  </div>
</div>
<script>
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('{{ "/sw.js" | relative_url }}');
  };
</script>
<script src="{{ '/assets/js/script.js' | relative_url }}"></script>
<script type="text/javascript" src="https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.1.0/dist/cookieconsent.umd.js"></script>
<script>
  CookieConsent.run({
  guiOptions: {
    consentModal: {
      layout: "box inline",
      position: "bottom right",
      flipButtons: true,
      equalWeightButtons: false
    },
    preferencesModal: {
      layout: "box",
      position: "bottom",
      flipButtons: true,
      equalWeightButtons: false
    }
  },

  categories: {
    necessary: {
      enabled: true,
      readonly: true
    },
    analytics: {
      enabled: false,
      readonly: false
    }
  },

  language: {
    default: "fr",
    translations: {
      fr: {
        consentModal: {
          title: "Respect de votre vie privée",
          description: `
            Nous utilisons uniquement des cookies nécessaires au bon fonctionnement du site,
            ainsi que, avec votre accord, des outils de mesure d’audience (Mixpanel).
            <br><br>
            Vous pouvez choisir d’accepter ou de refuser ces outils.
          `,
          acceptAllBtn: "Tout accepter",
          acceptNecessaryBtn: "Refuser",
          showPreferencesBtn: "Personnaliser"
        },

        preferencesModal: {
          title: "Préférences de confidentialité",
          acceptAllBtn: "Tout accepter",
          acceptNecessaryBtn: "Refuser",
          savePreferencesBtn: "Enregistrer",
          closeIconLabel: "Fermer",

          sections: [
            {
              title: "Notre approche",
              description: `
                Nous limitons au strict nécessaire l’utilisation de cookies.
                Aucun suivi n’est effectué sans votre consentement.
              `
            },

            {
              title: "Cookies nécessaires",
              description: `
                Ces cookies sont indispensables au fonctionnement du site
                et ne peuvent pas être désactivés.
              `,
              linkedCategory: "necessary"
            },

            {
              title: "Mesure d’audience",
              description: `
                Ces outils (Mixpanel) nous permettent de comprendre
                l’utilisation du site afin de l’améliorer.
                <br><br>
                Les données collectées sont utilisées uniquement à des fins internes
                et ne servent pas à vous identifier personnellement.
              `,
              linkedCategory: "analytics"
            },

            {
              title: "En savoir plus",
              description: `
                Pour plus d’informations, vous pouvez consulter notre
                <a href="/politique-de-confidentialite/">politique de confidentialité</a>
                ou nous contacter via la page <a href="/contact/">contact</a>.
              `
            }
          ]
        }
      }
    }
  }
});
</script>
</body>
</html>
